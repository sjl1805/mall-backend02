server:
  servlet:
    port: 8080
    context-path: /api
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mall?characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  cache:
    type: redis
    redis:
      time-to-live: 1h # 全局默认缓存时间

  # 添加Redis配置
  redis:
    host: localhost
    port: 6379
    password:  # 如果有密码需要填写
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
jwt:
  secret: "your-512-bit-secret-key-must-be-at-least-64-characters-long-1234567890abcdefghijklmnopqrstuvwxyz"
  expiration: 86400000  # 24小时
# 添加Swagger配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
    packages-to-scan: com.example.controller
    default-produces-media-type: application/json
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    filter: true
    persist-authorization: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:mapper/**/*.xml

logging:
  level:
    com.example.security: DEBUG
    org.springframework.security: DEBUG